{%- if cookiecutter.ci_tool == "GitHub Actions" %}
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:{{ cookiecutter.postgres_version }}
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: {{ cookiecutter.project_slug }}_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      FASTAPI_ENV: test
      SECRET_KEY: test-secret-key-not-for-production
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: {{ cookiecutter.project_slug }}_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pytest -v --cov
{%- endif %}
